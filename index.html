  <body>
    <script>
      (function() {
        try {
          var raw = localStorage.getItem('portfolio-config');
          if (raw) {
            var data = JSON.parse(raw);
            var state = data.state || data;
            if (state != null && typeof state.typographyScale === 'number') {
              document.documentElement.style.setProperty('--font-scale', String(state.typographyScale));
            }
            if (state != null && state.theme) {
              document.documentElement.setAttribute('data-theme', state.theme);
            }
            if (state != null && typeof state.speedScale === 'number') {
              document.documentElement.style.setProperty('--speed-scale', String(state.speedScale));
            }
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
